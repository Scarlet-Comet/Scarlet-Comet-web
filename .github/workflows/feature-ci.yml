name: "Feature CI"

on:
  push:
    branches-ignore:
      - main

jobs:
  ci-build:
    name: Build and Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test -- --watchAll=false

      - name: Build
        run: npm run build